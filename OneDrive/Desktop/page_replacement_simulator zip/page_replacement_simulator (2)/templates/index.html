<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page Replacement Simulator</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <div class="container">
        <nav class="mb-4 flex justify-end">
            <a href="{{ url_for('index') }}" class="text-blue-400 hover:underline mr-4">Home</a> | 
            <a href="{{ url_for('about') }}" class="text-blue-400 hover:underline">About Us</a>
        </nav>
        <h1 class="text-4xl font-bold mb-6 text-center text-blue-400">Page Replacement Simulator</h1>
        <form id="simulator-form" class="mb-6">
            <label for="frames" class="block mb-2 font-semibold">Number of Frames:</label>
            <input type="number" id="frames" name="frames" required class="border border-gray-600 p-3 mb-4 w-full rounded-lg bg-gray-800 text-white focus:outline-none focus:ring-2 focus:ring-blue-500" />
            <label for="pages" class="block mb-2 font-semibold">Page Numbers (space-separated):</label>
            <input type="text" id="pages" name="pages" required class="border border-gray-600 p-3 mb-4 w-full rounded-lg bg-gray-800 text-white focus:outline-none focus:ring-2 focus:ring-blue-500" />
            <button type="submit" class="bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700 transition duration-200 w-full">Simulate</button>
        </form>
        <div id="error-message" class="text-red-500 mb-4"></div>
        <div id="results" class="hidden">
            <h2 class="text-2xl font-semibold mb-4 text-gray-300">Results:</h2>
            <ul class="list-disc pl-5 mb-4 text-gray-300">
                <li id="fifo-result" class="mb-1">FIFO: <span class="font-medium text-blue-400"></span></li>
                <li id="lru-result" class="mb-1">LRU: <span class="font-medium text-blue-400"></span></li>
                <li id="optimal-result" class="mb-1">Optimal: <span class="font-medium text-blue-400"></span></li>
            </ul>
        </div>
    </div>
    <script>
        const form = document.getElementById('simulator-form');
        const errorMessage = document.getElementById('error-message');
        const resultsDiv = document.getElementById('results');
        const fifoResult = document.getElementById('fifo-result').querySelector('span');
        const lruResult = document.getElementById('lru-result').querySelector('span');
        const optimalResult = document.getElementById('optimal-result').querySelector('span');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.textContent = '';
            resultsDiv.classList.add('hidden');

            const frames = document.getElementById('frames').value;
            const pages = document.getElementById('pages').value;

            try {
                const response = await fetch('/simulate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ frames, pages })
                });

                const data = await response.json();

                if (!response.ok) {
                    errorMessage.textContent = data.error || 'An error occurred';
                    return;
                }

                fifoResult.textContent = data.FIFO;
                lruResult.textContent = data.LRU;
                optimalResult.textContent = data.Optimal;
                resultsDiv.classList.remove('hidden');
            } catch (error) {
                errorMessage.textContent = 'Failed to fetch results. Please try again.';
            }
        });
    </script>
</body>
</html>
